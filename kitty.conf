enable_audio_bell no

include color.ini

font_family      Hack Nerd Font
bold_font        Hack Nerd Font
italic_font      JetBrainsMono Nerd Font
bold_italic_font Hack Nerd Font
font_size 11.6


#JetBrainsMono

disable_ligatures true
window_padding_width 1 0 0 4
url_color #0250b6
repaint_delay 10
url_style curly

remember_window_size  no
initial_window_width  950
initial_window_height 600

# enabled_layauts
# window_resize_step_cells 3
# window_resize_step_lines 3

map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down

map f1 copy_to_buffer a
map f2 paste_from_buffer a
map f3 copy_to_buffer b
map f4 paste_from_buffer b

cursor_shape beam
cursor_beam_thickness 1.8

mouse_hide_wait 3.0
detect_urls yes

repaint_delay 10
input_delay 3
sync_to_monitor yes

map ctrl+shift+z toggle_layout stack
tab_bar_style powerline
tab_bar_edge buttom
tab_bar_align left
#tab_powerline_style round

inactive_tab_background #93a1a1
inactive_tab_foreground #3c3e5d
active_tab_background #005f87
active_tab_foreground #eeeeee
tar_bar_margin_color black

map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+enter new_window

background_opacity 0.8



shell zsh


